<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050508"/>
      <stop offset="100%" stop-color="#0d0d12"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="85%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="80%" cy="90%" r="35%">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#glow3)"/>

  <!-- Brand mark: glass-styled square with bolt -->
  <g transform="translate(80, 80)">
    <rect width="80" height="80" rx="20" fill="rgba(13,13,18,0.6)" stroke="#1e1e2e" stroke-width="1"/>
    <path d="M 44 16 L 24 46 L 38 46 L 36 64 L 56 34 L 42 34 Z" fill="#8b5cf6"/>
  </g>

  <text x="180" y="135" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="700" fill="#fafafa">Leffel Dev</text>
  <text x="180" y="165" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="500" fill="#8b5cf6" letter-spacing="3">PROJECT</text>

  <!-- Title -->
  <text x="80" y="320" font-family="'Space Grotesk', system-ui, sans-serif" font-size="116" font-weight="700" fill="url(#title)" letter-spacing="-3">AI Navigator</text>

  <!-- Subtitle -->
  <text x="80" y="380" font-family="'Space Grotesk', system-ui, sans-serif" font-size="32" font-weight="500" fill="#a1a1aa">A guided roadmap for the AI ecosystem</text>

  <!-- Feature pills -->
  <g font-family="'JetBrains Mono', ui-monospace, monospace" font-size="14" font-weight="500" letter-spacing="2">
    <g transform="translate(80, 460)">
      <rect width="240" height="48" rx="24" fill="rgba(139,92,246,0.1)" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.4"/>
      <text x="120" y="30" text-anchor="middle" fill="#a78bfa">PATHFINDER</text>
    </g>
    <g transform="translate(340, 460)">
      <rect width="220" height="48" rx="24" fill="rgba(6,182,212,0.1)" stroke="#06b6d4" stroke-width="1" stroke-opacity="0.4"/>
      <text x="110" y="30" text-anchor="middle" fill="#06b6d4">ECOSYSTEM</text>
    </g>
    <g transform="translate(580, 460)">
      <rect width="180" height="48" rx="24" fill="rgba(244,114,182,0.1)" stroke="#f472b6" stroke-width="1" stroke-opacity="0.4"/>
      <text x="90" y="30" text-anchor="middle" fill="#f472b6">LIBRARY</text>
    </g>
    <g transform="translate(780, 460)">
      <rect width="200" height="48" rx="24" fill="rgba(34,197,94,0.1)" stroke="#22c55e" stroke-width="1" stroke-opacity="0.4"/>
      <text x="100" y="30" text-anchor="middle" fill="#22c55e">CONCEPTS</text>
    </g>
  </g>

  <!-- Domain footer -->
  <text x="80" y="580" font-family="'JetBrains Mono', ui-monospace, monospace" font-size="20" font-weight="500" fill="#71717a" letter-spacing="2">ai-navigator.leffel.io</text>

  <!-- Decorative accent -->
  <circle cx="1100" cy="100" r="6" fill="#8b5cf6"/>
  <circle cx="1130" cy="130" r="4" fill="#06b6d4"/>
  <circle cx="1080" cy="140" r="3" fill="#f472b6"/>
</svg>
